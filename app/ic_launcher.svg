<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!-- Background rounded square -->
  <rect width="108" height="108" rx="22" fill="#12122A"/>

  <!-- T9 keypad grid: 3 columns x 4 rows -->
  <!-- Row 1 -->
  <rect x="10" y="10" width="25" height="20" rx="4" fill="#1E1E42"/>
  <rect x="41" y="10" width="25" height="20" rx="4" fill="#1E1E42"/>
  <rect x="72" y="10" width="25" height="20" rx="4" fill="#1E1E42"/>
  <!-- Row 2 -->
  <rect x="10" y="36" width="25" height="20" rx="4" fill="#1E1E42"/>
  <rect x="41" y="36" width="25" height="20" rx="4" fill="#1E1E42"/>
  <rect x="72" y="36" width="25" height="20" rx="4" fill="#1E1E42"/>
  <!-- Row 3 -->
  <rect x="10" y="62" width="25" height="20" rx="4" fill="#1E1E42"/>
  <rect x="41" y="62" width="25" height="20" rx="4" fill="#1E1E42"/>
  <rect x="72" y="62" width="25" height="20" rx="4" fill="#1E1E42"/>
  <!-- Row 4: cancel, 0, enter -->
  <rect x="10" y="88" width="25" height="12" rx="4" fill="#1A1A36"/>
  <rect x="41" y="88" width="25" height="12" rx="4" fill="#1A1A36"/>
  <rect x="72" y="88" width="25" height="12" rx="4" fill="#4444CC"/>

  <!-- Magnifier circle overlaid (centered, large) -->
  <circle cx="54" cy="47" r="28" fill="none" stroke="#5C5CFF" stroke-width="7"/>
  <!-- Magnifier handle -->
  <line x1="74" y1="67" x2="90" y2="83" stroke="#5C5CFF" stroke-width="7" stroke-linecap="round"/>
</svg>
